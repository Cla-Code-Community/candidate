services:
  scraper-go:
    build:
      context: ./scraper-go
      dockerfile: Dockerfile
    container_name: vagas-scraper-go
    env_file:
      - ./.env
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - GO_SCRAPER_ADDR=:8081
      - VALKEY_URL=redis://valkey:6379/0
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - vagas-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      target: backend
    container_name: vagas-backend
    env_file:
      - ./.env
    environment:
      - PORT=3001
      - PROMETHEUS_URL=http://prometheus:9090
      - SCRAPER_URL=http://scraper-go:8081
      - GO_SCRAPER_URL=http://scraper-go:8081
      - KEYWORDS_STORAGE_MODE=${KEYWORDS_STORAGE_MODE:-env}
      - CACHE_TTL_MS=${CACHE_TTL_MS:-600000}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-vagas-full}
    volumes:
      - ./backend/output:/app/output
    ports:
      - "3001:3001"
    depends_on:
      scraper-go:
        condition: service_healthy
    networks:
      - vagas-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      target: frontend-runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    container_name: vagas-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - vagas-net
    restart: unless-stopped

  front_admin:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      target: front-admin-runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_URL: ${VITE_API_URL}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    container_name: vagas-front-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - vagas-net
    restart: unless-stopped

networks:
  vagas-net:
    external: true
